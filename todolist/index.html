<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Tasks</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <h1>Tasks</h1>
        <span class="count-badge" id="taskCount">0</span>
      </div>
      <p class="header-date" id="currentDate"></p>
      <div class="input-row">
        <input type="text" id="taskInput" placeholder="New task..." autocomplete="off" autocorrect="yes" spellcheck="true">
        <button id="addBtn" class="add-btn" aria-label="Add task">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="filter-bar">
      <div class="segmented-control">
        <button class="segment active" data-filter="all">All</button>
        <button class="segment" data-filter="active">Active</button>
        <button class="segment" data-filter="completed">Done</button>
      </div>
    </div>

    <ul class="task-list" id="taskList"></ul>

    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
      </div>
      <p class="empty-title" id="emptyTitle">No tasks yet</p>
      <p class="empty-subtitle">Add one above to get started</p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
