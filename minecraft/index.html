<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft Clone</title>
  <style>
    /* ─── Reset ─────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    canvas { display: block; }

    /* ─── Block overlay ─────────────────────── */
    #blocker {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
      cursor: pointer;
      user-select: none;
    }
    #blocker h1 {
      color: #5cdb5c;
      font: bold 48px/1 'Courier New', monospace;
      text-shadow: 2px 2px 0 #1a5c1a, 4px 4px 0 #0a2e0a;
      margin-bottom: 24px;
      letter-spacing: 2px;
    }
    #blocker .subtitle {
      color: #aaa;
      font: 16px/1.6 'Courier New', monospace;
      text-align: center;
      margin-bottom: 16px;
    }
    #blocker .subtitle span { color: #5cdb5c; }
    #blocker .controls {
      color: #888;
      font: 13px/1.8 sans-serif;
      text-align: center;
      max-width: 420px;
    }
    #blocker .controls kbd {
      display: inline-block;
      background: #333; color: #eee;
      padding: 2px 7px; border-radius: 3px;
      font: bold 12px/1 monospace;
      border: 1px solid #555;
    }
    #blocker .click-msg {
      color: #fff;
      font: 18px/1 'Courier New', monospace;
      margin-top: 24px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ─── HUD ───────────────────────────────── */
    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font: 24px/1 'Courier New', monospace;
      pointer-events: none;
      z-index: 10;
      opacity: 0.8;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }

    #hotbar {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 4px;
      background: rgba(0,0,0,0.6);
      padding: 6px 8px;
      border-radius: 6px;
      border: 2px solid rgba(255,255,255,0.15);
      z-index: 10;
    }
    .slot {
      width: 50px; height: 50px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font: bold 12px/1 monospace;
      color: #fff;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      transition: border-color 0.1s, transform 0.1s;
      position: relative;
    }
    .slot .key-label {
      position: absolute; top: 2px; left: 4px;
      font: bold 10px/1 monospace;
      color: rgba(255,255,255,0.6);
    }
    .slot.active {
      border-color: #fff;
      transform: scale(1.08);
      box-shadow: 0 0 8px rgba(255,255,255,0.3);
    }
    .slot .block-preview {
      width: 28px; height: 28px;
      border-radius: 2px;
      margin-bottom: 1px;
    }
    .slot .slot-name {
      font-size: 9px;
      color: rgba(255,255,255,0.7);
    }

    #debug {
      position: fixed; top: 10px; left: 10px;
      color: #fff;
      font: 12px/1.4 monospace;
      background: rgba(0,0,0,0.5);
      padding: 8px 12px;
      border-radius: 4px;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Start overlay -->
  <div id="blocker">
    <h1>⛏ MINECRAFT</h1>
    <div class="subtitle">A <span>Three.js</span> voxel world</div>
    <div class="controls">
      <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> Move &nbsp;|&nbsp;
      <kbd>Space</kbd> Jump &nbsp;|&nbsp;
      <kbd>Shift</kbd> Sneak<br>
      <kbd>1</kbd>–<kbd>7</kbd> Select block &nbsp;|&nbsp;
      Left-click Break &nbsp;|&nbsp; Right-click Place<br>
      <kbd>[</kbd> <kbd>]</kbd> Sensitivity &nbsp;|&nbsp;
      <kbd>Ctrl+Q</kbd> Quality cycle
    </div>
    <div class="click-msg">[ Click to play ]</div>
    <div id="quality-badge" style="position:absolute;bottom:20px;right:24px;color:#5cdb5c;font:12px/1 monospace;opacity:0.7">Quality: --</div>
  </div>

  <!-- HUD -->
  <div id="crosshair">+</div>
  <div id="hotbar"></div>
  <div id="debug">Loading...</div>

  <!-- Three.js via CDN (works from file:// and over HTTP) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
